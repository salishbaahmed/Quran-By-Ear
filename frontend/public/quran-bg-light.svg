<svg width="420" height="420" viewBox="0 0 420 420" xmlns="http://www.w3.org/2000/svg">
  <!-- Persistent light watermark: an open Quran resting on a rehal/kursi stand -->
  <g fill="none" stroke="#15803d" stroke-opacity="0.16">
    <!-- Stand base -->
    <ellipse cx="210" cy="360" rx="118" ry="10" fill="#15803d" fill-opacity="0.05" stroke="none" />

    <!-- Rehal (X-shaped folding stand) legs -->
    <path d="M92 358 L200 250" stroke-width="4" stroke-linecap="round" />
    <path d="M328 358 L220 250" stroke-width="4" stroke-linecap="round" />
    <path d="M92 300 L328 300" stroke-width="3" stroke-linecap="round" stroke-opacity="0.12" />
    <path d="M118 358 L228 258" stroke-width="4" stroke-linecap="round" />
    <path d="M302 358 L192 258" stroke-width="4" stroke-linecap="round" />

    <!-- Cradle bar the book rests on -->
    <path d="M96 262 Q210 232 324 262" stroke-width="5" stroke-linecap="round" />

    <!-- Book: left page -->
    <path d="M78 250 Q86 128 206 108 L206 250 Q142 238 78 250 Z"
          fill="#15803d" fill-opacity="0.05" stroke-width="3" />
    <!-- Book: right page -->
    <path d="M342 250 Q334 128 214 108 L214 250 Q278 238 342 250 Z"
          fill="#15803d" fill-opacity="0.05" stroke-width="3" />
    <!-- Spine -->
    <path d="M206 108 Q210 104 214 108 L214 250 Q210 246 206 250 Z"
          fill="#15803d" fill-opacity="0.09" stroke="none" />

    <!-- Text lines: left page -->
    <line x1="100" y1="150" x2="188" y2="140" stroke-width="2" stroke-opacity="0.14" />
    <line x1="98" y1="166" x2="190" y2="156" stroke-width="2" stroke-opacity="0.14" />
    <line x1="97" y1="182" x2="192" y2="172" stroke-width="2" stroke-opacity="0.14" />
    <line x1="96" y1="198" x2="193" y2="188" stroke-width="2" stroke-opacity="0.14" />
    <line x1="95" y1="214" x2="194" y2="204" stroke-width="2" stroke-opacity="0.14" />
    <line x1="94" y1="230" x2="195" y2="220" stroke-width="2" stroke-opacity="0.14" />

    <!-- Text lines: right page -->
    <line x1="232" y1="140" x2="320" y2="150" stroke-width="2" stroke-opacity="0.14" />
    <line x1="230" y1="156" x2="322" y2="166" stroke-width="2" stroke-opacity="0.14" />
    <line x1="228" y1="172" x2="323" y2="182" stroke-width="2" stroke-opacity="0.14" />
    <line x1="227" y1="188" x2="324" y2="198" stroke-width="2" stroke-opacity="0.14" />
    <line x1="226" y1="204" x2="325" y2="214" stroke-width="2" stroke-opacity="0.14" />
    <line x1="225" y1="220" x2="326" y2="230" stroke-width="2" stroke-opacity="0.14" />

    <!-- Soft ornamental arch above the book -->
    <path d="M150 108 Q210 66 270 108" stroke-width="2.5" stroke-opacity="0.1" />
  </g>
</svg>
